<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Helper - Icon Generator</title>
  <style>
    body {
      background: #0a0a0f;
      color: #f1f1f5;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
    }
    h1 { font-size: 1.5rem; }
    .icons { display: flex; gap: 2rem; align-items: end; }
    .icon-card {
      background: #13131f;
      border: 1px solid #2a2a40;
      border-radius: 0.75rem;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    canvas {
      border-radius: 0.5rem;
      image-rendering: pixelated;
    }
    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #4f46e5; }
    .note { color: #7c7cb5; font-size: 0.85rem; text-align: center; max-width: 400px; }
  </style>
</head>
<body>
  <h1>PWA Icon Generator</h1>
  <div class="icons">
    <div class="icon-card">
      <canvas id="icon192" width="192" height="192"></canvas>
      <button onclick="downloadIcon('icon192', 'icon-192x192.png')">Download 192x192</button>
    </div>
    <div class="icon-card">
      <canvas id="icon512" width="512" height="512"></canvas>
      <button onclick="downloadIcon('icon512', 'icon-512x512.png')">Download 512x512</button>
    </div>
  </div>
  <p class="note">Klikni na "Download" pro stažení PNG souborů. Poté je ulož do složky pwa/icons/.</p>

  <script>
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');

      // Background
      ctx.fillStyle = '#6366f1';
      ctx.beginPath();
      const radius = size * 0.125; // 24/192 or 64/512
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.fill();

      // Text
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${size * 0.43}px system-ui, -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('M', size / 2, size / 2);
    }

    function downloadIcon(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    drawIcon('icon192', 192);
    drawIcon('icon512', 512);
  </script>
</body>
</html>
