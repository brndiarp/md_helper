<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - MD Helper</title>
  <style>
    body {
      background: #0a0a0f;
      color: #f1f1f5;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      text-align: center;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #a0a0c8; margin-bottom: 2rem; }
    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <h1>Jsi offline</h1>
  <p>MD Helper vyžaduje připojení k internetu pro první načtení.<br>Zkontroluj své připojení a zkus to znovu.</p>
  <button onclick="location.reload()">Zkusit znovu</button>
</body>
</html>
